## demo compose file for Chronos agent registry + MCP gateway.
##
## includes Chronos + postgresql, a simple streamable-http MCP server,
## and a minimal TypeScript HTTP agent that calls back into the Chronos MCP gateway when prompted with `<n> + <m>`.
## 
## see ./readme.md for the usage walkthrough.
##
services:
    chronos:
        image: chronos:local
        environment:
            DATABASE_TYPE: postgres
            DATABASE_HOST: postgres
            DATABASE_PORT: 5432
            DATABASE_NAME: chronos
            DATABASE_USER: chronos
            DATABASE_PASSWORD: secret
            CHRONOS_INITIAL_USER: admin@admin.com:test1234:admin
            DEBUG: true
            LOG_SANITIZE_HEADER_FIELDS: authorization,x-api-key,x-auth-token,cookie
            LOG_SANITIZE_BODY_FIELDS: password,pwd,pass,secret,token,apikey,api_key,accesstoken,access_token,refreshtoken
            ## agent Registry + MCP gateway flags
            ENABLE_AGENTS: "true"
            ENABLE_MCP_SERVERS: "true"
            ## Required: the docker bridge network uses RFC1918 addresses, which
            ## the SSRF gate would otherwise reject. dev-only.
            ALLOW_LOOPBACK_AGENTS: "true"
        ports:
            - "3001:3000"
        volumes:
            - ./.chronos:/root/.chronos
        depends_on:
            - postgres

    postgres:
        image: postgres:15
        ports:
            - "5432:5432"
        volumes:
            - ./.postgres_data:/var/lib/postgresql/data
        environment:
            POSTGRES_DB: chronos
            POSTGRES_USER: chronos
            POSTGRES_PASSWORD: secret

    ## Reference MCP server. small streamable-http server in ./mcp/ that
    ## exposes two tools: `echo` and `add`. built locally so no dependencies. 
    ##
    ## registration inside Chronos:
    ##   transport=streamable-http  url=http://mcp-reference:7800/mcp
    mcp-reference:
        build:
            context: ./mcp
        environment:
            PORT: "7800"
        ports:
            - "7800:7800"

    ## Minimal agent. Implements GET /health and POST /v1/chat/completions.
    ## When the last user message contains an expression like `2 + 3`, it
    ## calls back into the Chronos MCP gateway to invoke `reference.add`
    ## and returns the result. Otherwise it echoes the input.
    ##
    ## Each agent in Chronos after registration get callback token.
    ## fin the token on the agent details page, set it on the host as
    ## EXAMPLE_AGENT_CALLBACK_TOKEN, then restart only this service:
    ##
    ##  EXAMPLE_AGENT_CALLBACK_TOKEN=<hex> docker compose up -d --no-deps example-agent
    example-agent:
        build:
            context: ./agent
        environment:
            PORT: "8001"
            CALLBACK_TOKEN: "${EXAMPLE_AGENT_CALLBACK_TOKEN:-}"
        ports:
            - "8001:8001"
        depends_on:
            - chronos
